<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ByteMart - Everyday Tech, Everyday Price</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🛒 ByteMart</div>
    <nav>
      <button id="nav-shop" class="nav-btn active">Shop</button>
      <button id="nav-login" class="nav-btn">Login</button>
      <button id="nav-admin" class="nav-btn">Admin Panel</button>
    </nav>
  </header>

  <main>
    <section id="view-shop" class="view">
      <h1>Find your next gadget</h1>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search products... (try: keyboard)" />
        <button id="search-btn">Search</button>
      </div>
      <div id="search-error" class="error-box" style="display:none;"></div>
      <div id="products-grid" class="grid"></div>
    </section>

    <section id="view-login" class="view" style="display:none;">
      <h1>Account Login</h1>
      <form id="login-form" class="card">
        <label>Username</label>
        <input type="text" id="login-username" required />
        <label>Password</label>
        <input type="password" id="login-password" required />
        <button type="submit">Login</button>
        <p id="login-message" class="message"></p>
      </form>
    </section>

    <section id="view-admin" class="view" style="display:none;">
      <h1>Admin Panel</h1>
      <div class="card">
        <p id="admin-status">Checking session...</p>
        <pre id="admin-output" class="output-box"></pre>
      </div>
    </section>
  </main>

  <footer>
    <p>ByteMart Demo Store — CTF Lab 01 (SQL Injection) — for educational use only.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
