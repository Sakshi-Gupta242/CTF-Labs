<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Portal — Lab 02 XSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="#" class="brand" data-view="home">Feedback<span>Portal</span></a>
    <div class="nav-links">
      <a href="#" class="nav-link active" data-view="home">Home</a>
      <a href="#" class="nav-link" data-view="admin">Admin Panel</a>
    </div>
  </nav>

  <!-- ================================================================
       HOME VIEW — Public feedback submission form
       ================================================================ -->
  <main id="view-home" class="view">
    <div class="container">
      <header class="hero">
        <h1>We value your feedback</h1>
        <p>Tell us what you think about our service. Every submission is reviewed by our team.</p>
      </header>

      <section class="card">
        <h2>Submit Feedback</h2>
        <form id="feedback-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required maxlength="100">
          </div>
          <div class="form-group">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" name="feedback" placeholder="Share your thoughts..." required maxlength="2000"></textarea>
          </div>
          <button type="submit" class="btn">Submit Feedback</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>
    </div>
  </main>

  <!-- ================================================================
       ADMIN VIEW — Displays all feedback using innerHTML (VULNERABLE)
       ================================================================ -->
  <main id="view-admin" class="view hidden">
    <div class="container">
      <header class="hero">
        <h1>Admin Panel</h1>
        <p>Review all submitted feedback. <span class="badge">Staff only</span></p>
      </header>

      <section class="card">
        <div class="admin-toolbar">
          <h2>Submitted Feedback</h2>
          <button id="refresh-btn" class="btn btn-secondary">Refresh</button>
        </div>
        <div id="feedback-list">
          <p class="muted">Loading feedback...</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    Lab 02 — Stored XSS &middot; CTF-Labs
  </footer>

  <script src="app.js"></script>
</body>
</html>
